name: 🗑 Clean downloads folder

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Clean downloads folder
        run: |
          rm -rf downloads
          mkdir -p downloads

          cat > downloads/README.md << 'EOF'
          # Downloads

          No file downloaded yet.
          EOF

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "[AVASAM] Clean downloads folder [skip ci]"

      - name: Push changes
        run: |
          git push origin HEAD:${GITHUB_REF_NAME}